url: https://meagan-kingren.github.io/metaboTYPE2.0/
template:
  bootstrap: 5
  bslib:
    bootswatch: morph
    base_font: {google: "Outfit"}
    code_font: "Fira Code"
  light-switch: true


reference:
  - title: Functions that graph things
    desc: These functions will all graph data.
    contents:
      - plot_ts
      - plot_ts_24h
      - plot_ts_all
      - graph_boxplot

  - title: Functions that organize data
    desc: These functions will all arrange and clean data.
    contents:
      - align_to_common_time
      - align_to_photoperiod
      - create_photoperiods
      - summarize_subjects
      - add_exp_time
      - clean_PedMeters
      - clean_RER
      - calc_feeding_events
      - filter_feeding_events

  - title: Other functions
    desc: Remaining functions this package contains
    contents:
      - get_columns
      - sem
      - stdev

footer:
  structure:
    left: developed_by
    right: built_with_pkgdown
  components:
    developed_by: "Developed by [Meagan S Kingren] :computer: "
    built_with_pkgdown: "This site was built using [pkgdown](https://pkgdown.r-lib.org/)!&nbsp;&nbsp;<img src='https://pkgdown.r-lib.org/logo.png' alt='pkgdown logo' width='25'>"




